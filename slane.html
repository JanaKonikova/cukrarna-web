.gallery-container{
max-width:1100px;

}

.gallery-container img{
width:200px;
height:150px;
object-fit:cover;
border-radius:12px;
transition:0.25s;

}

.gallery-container img:hover{
transform:scale(1.05);
}

.back-btn{
display:block;
margin:30px auto;
padding:12px 30px;
border-radius:50px;
background:#4caf88;
color:white;
font-weight:700;
text-decoration:none;
transition:0.3s;
text-align:center;
}

.back-btn:hover{
background:#397d65;
transform:scale(1.05);
}
