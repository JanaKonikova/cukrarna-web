<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celá nabídka</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fffaf0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* horní pruh */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#5a3e36;
  color:white;
  padding:15px 30px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

header h1{
  margin:0;
  text-align:center;
  flex:1;
  font-size:1.8rem;
}

header .company-name{
  font-weight:700;
  font-size:1.5rem;
}

/* kontejner pro tlačítka kategorií */
.categories-container{
  max-width:1200px;
  margin:50px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  justify-items:center;
}

/* spodní 3 tlačítka uprostřed */
.categories-container a:nth-child(n+5){
  justify-self:center;
}

/* velká tlačítka kategorií */
.category-btn{
  background:#4caf88;
  color:white;
  padding:40px 20px;
  text-align:center;
  font-size:1.5rem;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:160px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.category-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* mobilní verze */
@media(max-width:768px){
  .categories-container{
    grid-template-columns:1fr;
    gap:20px;
  }
  .category-btn{
    min-height:140px;
    font-size:1.3rem;
  }
}

/* tlačítko zpět */
.back-btn{
  display:block;
  margin:60px auto 40px auto;
  padding:18px 50px;
  border-radius:50px;
  background:#4caf88;
  color:white;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  font-size:1.3rem;
  transition:0.3s;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.back-btn:hover{
  background:#397d65;
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<header>
  <div class="company-name">Cukrárna Jana Koníková</div>
  <h1>Naše nabídka</h1>
  <div style="width:150px"></div> <!-- pro vyrovnání -->
</header>

<div class="categories-container">

  <a href="dorty.html" class="category-btn">Dorty</a>
  <a href="zakusky.html" class="category-btn">Zákusky</a>
  <a href="svatebni.html" class="category-btn">Svatební dorty</a>
  <a href="mini.html" class="category-btn">Mini zákusky</a>
  <a href="slane.html" class="category-btn">Slané</a>
  <a href="cukrovi.html" class="category-btn">Cukroví</a>
  <a href="rolady.html" class="category-btn">Rolády</a>

</div>

<!-- Tlačítko zpět na spodku stránky -->
<a href="index.html" class="back-btn">Zpět</a>

</body>
</html>
