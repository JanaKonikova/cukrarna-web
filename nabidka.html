<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celá nabídka</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fffaf0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* horní pruh */
header{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  background:#f5f0e6;
  color:#5a3e36;
  padding:15px 30px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
header .company-name{
  font-weight:700;
  font-size:1.5rem;
}

/* hlavní nadpis */
.main-title{
  text-align:center;
  font-size:2.5rem;
  font-weight:700;
  margin:40px 0 30px 0;
  color:#5a3e36;
}

/* hlavní grid pro všechny tlačítka */
.categories-container{
  max-width:1200px;
  margin:0 auto 50px auto;
  padding:0 20px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:30px;
  justify-items:center;
}

/* placeholder pro spodní řadu (prázdné místo vlevo a vpravo) */
.categories-container::before,
.categories-container::after{
  content:"";
  display:block;
}

/* velká tlačítka */
.category-btn{
  background: rgba(76,175,136,0.8);
  color:white;
  padding:50px 25px;
  text-align:center;
  font-size:1.6rem;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:180px;
  width:100%;
  max-width:280px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  border:2px solid rgba(0,0,0,0.1);
  background-image: linear-gradient(to bottom right, rgba(76,175,136,0.8), rgba(0,0,0,0.1));
}

.category-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  background-image: linear-gradient(to bottom right, rgba(76,175,136,1), rgba(0,0,0,0.2));
}

/* mobilní verze */
@media(max-width:768px){
  .categories-container{
    grid-template-columns:1fr;
  }
  .category-btn{
    min-height:140px;
    font-size:1.3rem;
    max-width:100%;
  }
}

/* tlačítko zpět */
.back-btn{
  display:block;
  margin:80px auto 40px auto;
  padding:18px 50px;
  border-radius:50px;
  background:#397d65;
  color:white;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  font-size:1.3rem;
  transition:0.3s;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}
.back-btn:hover{
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  background:#2e5d4a;
}
</style>
</head>
<body>

<header>
  <div class="company-name">Cukrárna Jana Koníková</div>
</header>

<h2 class="main-title">Naše nabídka</h2>

<div class="categories-container">
  <!-- první řada: 4 tlačítka -->
  <a href="dorty.html" class="category-btn">Dorty</a>
  <a href="zakusky.html" class="category-btn">Zákusky</a>
  <a href="svatebni.html" class="category-btn">Svatební dorty</a>
  <a href="mini.html" class="category-btn">Mini zákusky</a>
  <!-- druhá řada: 3 tlačítka, placeholdery vlevo a vpravo se postarají o zarovnání -->
  <a href="slane.html" class="category-btn">Slané</a>
  <a href="cukrovi.html" class="category-btn">Cukroví</a>
  <a href="rolady.html" class="category-btn">Rolády</a>
</div>

<a href="index.html" class="back-btn">Zpět</a>

</body>
</html>
