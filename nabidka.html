<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celá nabídka</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:0;
  background:#fffaf0;
}

/* kontejner pro tlačítka kategorií */
.categories-container{
  max-width:1200px;
  margin:50px auto;
  padding:0 20px;
  display:grid;
  /* “přeházená” mřížka: první řádek 2x větší, pak 3x menší */
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

/* velká tlačítka kategorií */
.category-btn{
  background:#4caf88;
  color:white;
  padding:40px 20px;
  text-align:center;
  font-size:1.5rem;
  border-radius:20px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
  text-decoration:none;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:160px;
}

.category-btn:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* mobilní verze */
@media(max-width:768px){
  .categories-container{
    grid-template-columns:1fr;
    gap:20px;
  }
  .category-btn{
    min-height:140px;
    font-size:1.3rem;
  }
}

/* tlačítko zpět */
.back-btn{
  display:block;
  margin:60px auto;
  padding:18px 50px;
  border-radius:50px;
  background:#4caf88;
  color:white;
  font-weight:700;
  text-decoration:none;
  text-align:center;
  font-size:1.3rem;
  transition:0.3s;
}

.back-btn:hover{
  background:#397d65;
  transform:scale(1.05);
}
</style>
</head>
<body>

<header>
  <h1 style="text-align:center;margin-top:30px;">Naše nabídka</h1>
</header>

<div class="categories-container">

  <a href="dorty.html" class="category-btn">Dorty</a>
  <a href="zakusky.html" class="category-btn">Zákusky</a>
  <a href="svatebni.html" class="category-btn">Svatební dorty</a>
  <a href="mini.html" class="category-btn">Mini zákusky</a>
  <a href="slane.html" class="category-btn">Slané</a>
  <a href="cukrovi.html" class="category-btn">Cukroví</a>
  <a href="rolady.html" class="category-btn">Rolády</a>

</div>

<!-- Tlačítko zpět -->
<a href="index.html" class="back-btn">Zpět</a>

</body>
</html>
